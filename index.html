<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Payment Check | Dastak Delivery Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex items-center justify-center p-4">

    <script>
        // ✅ Same Firebase project jo Rider/Admin portal use karta hai — data wahi se aata hai
        const firebaseConfig = {
            apiKey: "AIzaSyBdKbba0NjNmW2LNxEILiIcjv3DU3LTnks",
            authDomain: "dastak-rider-portal-1b9d9.firebaseapp.com",
            projectId: "dastak-rider-portal-1b9d9",
            storageBucket: "dastak-rider-portal-1b9d9.firebasestorage.app",
            messagingSenderId: "714540074485",
            appId: "1:714540074485:web:cf393ebd7edbedae518cbc"
        };
        firebase.initializeApp(firebaseConfig);
        window.db = firebase.firestore();
    </script>

    <div class="fade-in w-full max-w-md">
        <!-- ✅ Customer Self-Lookup Panel -->
        <div class="bg-white rounded-2xl shadow-lg w-full border border-green-100">
            <div class="bg-gradient-to-r from-green-600 to-teal-600 text-white p-5 rounded-t-2xl text-center">
                <i class="fas fa-user-circle text-3xl mb-2"></i>
                <h3 class="font-bold text-lg">Customer Payment Check</h3>
                <p class="text-green-100 text-xs mt-1">Apni Customer ID daal kar apni payments dekhen</p>
            </div>
            <div class="p-5">
                <div class="flex gap-2 mb-4">
                    <div class="relative flex-1">
                        <i class="fas fa-id-card absolute left-3 top-1/2 -translate-y-1/2 text-green-500 text-sm"></i>
                        <input type="text" id="cust-lookup-id"
                            placeholder="e.g. M081, A567..."
                            class="w-full pl-10 pr-3 py-3 border-2 border-green-200 rounded-xl text-sm font-mono font-semibold outline-none focus:border-green-500 uppercase"
                            oninput="this.value=this.value.toUpperCase()"
                            onkeydown="if(event.key==='Enter') customerLookup()">
                    </div>
                    <button onclick="customerLookup()"
                        class="bg-green-600 text-white px-5 py-3 rounded-xl font-bold hover:bg-green-700 transition-colors flex items-center gap-2">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div id="cust-lookup-result" class="hidden"></div>
                <p class="text-xs text-gray-400 text-center">Customer ID rider se ya Dastak se hasil karein</p>
            </div>
            <div class="text-center pb-4">
                <p class="text-[11px] text-gray-300">Dastak Delivery Service</p>
            </div>
        </div>
    </div>

    <script>
        // ✅ Customer self-lookup — no login needed, same data as rider/admin portal
        async function customerLookup() {
            const inputId = (document.getElementById('cust-lookup-id')?.value || '').trim().toUpperCase();
            const resultDiv = document.getElementById('cust-lookup-result');
            if (!inputId) { alert('Customer ID likhein!'); return; }

            resultDiv.innerHTML = `<div class="text-center py-4 text-gray-400"><i class="fas fa-spinner fa-spin text-2xl"></i><p class="text-sm mt-2">Dhundh raha hoon...</p></div>`;
            resultDiv.classList.remove('hidden');

            try {
                // Firebase se customer dhundho by customerId
                const snap = await window.db.collection('customers').where('customerId', '==', inputId).limit(1).get();

                if (snap.empty) {
                    resultDiv.innerHTML = `<div class="text-center py-4">
                        <i class="fas fa-times-circle text-red-400 text-3xl mb-2"></i>
                        <p class="text-sm font-semibold text-red-600">Customer ID nahi mili</p>
                        <p class="text-xs text-gray-400 mt-1">"${inputId}" — dobara check karein</p>
                    </div>`;
                    return;
                }

                const customer = { id: snap.docs[0].id, ...snap.docs[0].data() };

                // Ab us customer ki saari payments dhundho
                const reportsSnap = await window.db.collection('reports').get();
                const allPending = [], allReceived = [];

                reportsSnap.docs.forEach(doc => {
                    const r = doc.data();
                    (r.onlinePayments || []).forEach(p => {
                        const custPhone = (customer.phone||'').replace(/\D/g,'').slice(-10);
                        const custName = (customer.name||'').toLowerCase();
                        const detail = (p.detail||'').toLowerCase();
                        const dPhone = detail.replace(/\D/g,'').slice(-10);
                        const idMatch = (p.customerId||'').toUpperCase() === inputId;
                        const phoneMatch = custPhone.length>=10 && dPhone===custPhone;
                        const nameMatch = custName.length>=3 && detail.includes(custName);
                        const docIdMatch = (p.customerDocId||'') === customer.id;

                        if (idMatch || phoneMatch || nameMatch || docIdMatch) {
                            const payment = {
                                date: r.date,
                                amount: p.amount || 0,
                                detail: p.detail || '',
                                items: p.items || '',
                                status: p.status || 'pending'
                            };
                            if (p.status === 'pending') allPending.push(payment);
                            else allReceived.push(payment);
                        }
                    });
                });

                allPending.sort((a,b) => new Date(b.date)-new Date(a.date));
                allReceived.sort((a,b) => new Date(b.date)-new Date(a.date));

                const totalPending = allPending.reduce((a,p)=>a+p.amount,0);
                const totalReceived = allReceived.reduce((a,p)=>a+p.amount,0);

                resultDiv.innerHTML = `
                    <div class="border-t border-gray-100 pt-4">
                        <!-- Customer info -->
                        <div class="flex items-center gap-3 mb-4 bg-green-50 rounded-xl p-3">
                            <div class="w-12 h-12 rounded-full bg-green-600 text-white flex items-center justify-center font-bold text-xl">${(customer.name||'?').charAt(0).toUpperCase()}</div>
                            <div>
                                <p class="font-bold text-gray-800">${customer.name}</p>
                                <p class="text-xs text-green-700 font-mono font-semibold">🆔 ${customer.customerId}</p>
                                ${customer.address ? `<p class="text-xs text-gray-500">${customer.address}</p>` : ''}
                            </div>
                        </div>

                        <!-- Summary -->
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <div class="bg-orange-50 border border-orange-200 rounded-xl p-3 text-center">
                                <p class="text-xs text-orange-600 font-medium">⏳ Pending</p>
                                <p class="text-xl font-bold text-orange-700">Rs ${totalPending.toLocaleString()}</p>
                                <p class="text-xs text-orange-500">${allPending.length} payment${allPending.length!==1?'s':''}</p>
                            </div>
                            <div class="bg-green-50 border border-green-200 rounded-xl p-3 text-center">
                                <p class="text-xs text-green-600 font-medium">✅ Paid</p>
                                <p class="text-xl font-bold text-green-700">Rs ${totalReceived.toLocaleString()}</p>
                                <p class="text-xs text-green-500">${allReceived.length} payment${allReceived.length!==1?'s':''}</p>
                            </div>
                        </div>

                        <!-- Pending list -->
                        ${allPending.length > 0 ? `
                        <div class="mb-3">
                            <h4 class="text-xs font-bold text-orange-600 uppercase tracking-wider mb-2">⏳ Pending Payments</h4>
                            <div class="space-y-2">
                                ${allPending.map(p => `
                                <div class="bg-orange-50 border border-orange-100 rounded-xl p-3">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <p class="text-xs text-gray-500">${new Date(p.date).toLocaleDateString('en-PK',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</p>
                                            ${p.items ? `<p class="text-xs text-gray-600 mt-0.5">🛒 ${p.items}</p>` : ''}
                                        </div>
                                        <p class="font-bold text-orange-700">Rs ${p.amount.toLocaleString()}</p>
                                    </div>
                                </div>`).join('')}
                            </div>
                        </div>` : '<div class="bg-green-50 rounded-xl p-3 text-center text-green-700 text-sm font-semibold mb-3">🎉 Koi pending payment nahi!</div>'}

                        <!-- Received list -->
                        ${allReceived.length > 0 ? `
                        <div>
                            <h4 class="text-xs font-bold text-green-600 uppercase tracking-wider mb-2">✅ Paid Payments</h4>
                            <div class="space-y-2">
                                ${allReceived.map(p => `
                                <div class="bg-gray-50 border border-gray-100 rounded-xl p-3 opacity-75">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <p class="text-xs text-gray-500">${new Date(p.date).toLocaleDateString('en-PK',{weekday:'short',day:'numeric',month:'short',year:'numeric'})}</p>
                                            ${p.items ? `<p class="text-xs text-gray-500 mt-0.5">🛒 ${p.items}</p>` : ''}
                                        </div>
                                        <p class="font-bold text-green-600">Rs ${p.amount.toLocaleString()}</p>
                                    </div>
                                </div>`).join('')}
                            </div>
                        </div>` : ''}

                        ${allPending.length===0 && allReceived.length===0 ? `
                        <div class="text-center py-4 text-gray-400">
                            <i class="fas fa-receipt text-3xl mb-2"></i>
                            <p class="text-sm">Koi payment record nahi mili</p>
                        </div>` : ''}
                    </div>`;

            } catch(e) {
                resultDiv.innerHTML = `<div class="text-center py-4 text-red-500"><i class="fas fa-exclamation-circle text-2xl mb-2"></i><p class="text-sm">Error: ${e.message}</p></div>`;
            }
        }
    </script>
</body>
</html>
